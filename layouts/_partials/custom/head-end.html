<style>
  @media (min-width: 768px) {
    .hextra-sidebar-container.hx\:md\:hidden.hx\:xl\:block {
      display: flex !important;
    }
  }
  /* GitHub badge in navbar */
  .github-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.35rem 0.5rem;
    text-decoration: none !important;
    color: inherit !important;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .github-badge:hover {
    opacity: 0.7;
  }
  .github-badge .gh-icon {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
  }
  .github-badge .gh-info {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }
  .github-badge .gh-name {
    font-weight: 600;
    font-size: 0.95rem;
    line-height: 1;
    margin-top: -0.1rem;
  }
  .github-badge .gh-stats {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
    line-height: 1;
    opacity: 0.6;
  }
  .github-badge .gh-stat {
    display: inline-flex;
    align-items: center;
    gap: 0.2rem;
  }
  .github-badge .gh-stat svg {
    width: 12px;
    height: 12px;
  }
  @media (max-width: 640px) {
    .github-badge .gh-info {
      display: none;
    }
    .github-badge {
      padding: 0.4rem;
    }
  }
  .doc-friend-links {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    margin: 24px 0;
  }
  .doc-friend-link {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    padding: 16px 18px;
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 16px;
    background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    text-decoration: none !important;
    color: #0f172a !important;
    transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .doc-friend-link:hover {
    border-color: rgba(59, 130, 246, 0.18);
    box-shadow: 0 14px 34px rgba(15, 23, 42, 0.1);
  }
  .doc-friend-link img {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    flex: none;
  }
  .doc-friend-link-title {
    flex: 1;
    text-align: left;
    font-weight: 600;
    line-height: 1.5;
  }
  html.dark .doc-friend-link {
    border-color: rgba(148, 163, 184, 0.16);
    background: linear-gradient(135deg, #111827 0%, #0f172a 100%);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    color: #e5eefb !important;
  }
  html.dark .doc-friend-link:hover {
    border-color: rgba(96, 165, 250, 0.28);
    box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
  }
  @media (max-width: 768px) {
    .doc-friend-links {
      grid-template-columns: 1fr;
    }
  }
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var links = document.querySelectorAll('.hextra-nav-container nav a[href*="github.com/changyicheng1234/OpenISE"]');
  if (!links.length) return;
  var link = links[0];

  link.className = 'github-badge';
  link.removeAttribute('title');
  link.innerHTML = ''
    + '<svg class="gh-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>'
    + '<div class="gh-info">'
    +   '<span class="gh-name">OpenISE</span>'
    +   '<span class="gh-stats">'
    +     '<span class="gh-stat"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25z"/></svg> <span id="gh-star-count">-</span></span>'
    +     '<span class="gh-stat"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"/></svg> <span id="gh-fork-count">-</span></span>'
    +   '</span>'
    + '</div>';

  fetch('https://api.github.com/repos/changyicheng1234/OpenISE')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.stargazers_count !== undefined) {
        document.getElementById('gh-star-count').textContent = data.stargazers_count;
      }
      if (data.forks_count !== undefined) {
        document.getElementById('gh-fork-count').textContent = data.forks_count;
      }
    })
    .catch(function() {});

  var applyGiscusTheme = function() {
    var iframe = document.querySelector('iframe.giscus-frame');
    if (!iframe) return;
    iframe.contentWindow.postMessage(
      {
        giscus: {
          setConfig: {
            theme: document.documentElement.classList.contains('dark') ? 'dark' : 'light'
          }
        }
      },
      'https://giscus.app'
    );
  };

  var observer = new MutationObserver(applyGiscusTheme);
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  window.addEventListener('message', function(event) {
    if (event.origin === 'https://giscus.app') {
      applyGiscusTheme();
    }
  });
});
</script>
